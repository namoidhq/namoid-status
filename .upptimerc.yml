owner: namoidhq
repo: namoid-status

sites:
  # Every endpoint is checked from 🇮🇳 India (Globalping) — NamoID's users are in India,
  # so we measure latency from where they actually are (not GitHub's US runners).
  # Both owners (harshita3199 + ShivSankalp) are paged on every incident via top-level `assignees`.
  # NOTE: add a GLOBALPING_TOKEN repo secret for reliable rate limits across 5 checks every 5 min.
  - name: Marketing
    url: https://namoid.in
    type: globalping
    location: India
    maxResponseTime: 3000
    expectedStatusCodes:
      - 200

  - name: API Liveness
    url: https://api.namoid.in/healthz
    type: globalping
    location: India
    maxResponseTime: 1500
    expectedStatusCodes:
      - 200

  - name: API Readiness
    url: https://api.namoid.in/readyz
    type: globalping
    location: India
    maxResponseTime: 2000
    expectedStatusCodes:
      - 200          # /readyz returns 503 when Postgres or Redis is down — let that page us

  - name: OIDC Discovery
    url: https://api.namoid.in/.well-known/openid-configuration
    type: globalping
    location: India
    maxResponseTime: 1500
    expectedStatusCodes:
      - 200
    __dangerous__body_down_if_text_missing: '"issuer"'   # not just 200 — verify it's a real discovery doc

  - name: JWKS
    url: https://api.namoid.in/jwks.json
    type: globalping
    location: India
    maxResponseTime: 1500
    expectedStatusCodes:
      - 200
    __dangerous__body_down_if_text_missing: '"keys"'

  # --- Hidden from the status page pre-GA (commented out on request) ---
  # To monitor again: uncomment a block; flip 401 -> 200 when Basic Auth is removed at GA.
  # - name: Dashboard
  #   url: https://app.namoid.in
  #   maxResponseTime: 3000
  #   expectedStatusCodes:
  #     - 401          # Basic-auth gated pre-GA; 401 proves Caddy + web container are serving
  #
  # - name: Docs
  #   url: https://docs.namoid.in
  #   maxResponseTime: 3000
  #   expectedStatusCodes:
  #     - 401

status-website:
  cname: status.namoid.in
  name: NamoID Status
  introTitle: "NamoID Status"
  introMessage: "Live uptime, response times, and incident history for NamoID — the marketing site, API, and OIDC identity provider."
  logoUrl: https://namoid.in/brand/namoid-mark.svg       # emerald tile + white N — reads well on dark
  favicon: https://namoid.in/icon-192.png                # PNG favicon (Upptime's `favicon` expects PNG)
  faviconSvg: https://namoid.in/brand/namoid-favicon.svg # crisp SVG favicon for modern browsers
  theme: light
  # Open Graph / Twitter card so the status link previews on-brand when shared in Slack/X
  metaTags:
    - property: "og:title"
      content: "NamoID Status"
    - property: "og:description"
      content: "Live uptime, response times, and incident history for NamoID."
    - property: "og:image"
      content: "https://namoid.in/brand/namoid-og.png"
    - property: "og:url"
      content: "https://status.namoid.in"
    - property: "og:type"
      content: "website"
    - name: "twitter:card"
      content: "summary_large_image"
    - name: "twitter:title"
      content: "NamoID Status"
    - name: "twitter:description"
      content: "Live uptime, response times, and incident history for NamoID."
    - name: "twitter:image"
      content: "https://namoid.in/brand/namoid-og.png"
  navbar:
    - title: Home
      href: /
    - title: Website
      href: https://namoid.in
    - title: Docs
      href: https://docs.namoid.in
    - title: Report an issue
      href: https://github.com/namoidhq/namoid-status/issues
  # NamoID brand polish — palette: emerald #0e5b47 · deep #0a4a39 · mint #cfe3da · ink #0a0a0a
  # Fonts: Plus Jakarta Sans (body) + JetBrains Mono (code), per the brand guide.
  css: |
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
    :root {
      --namoid-emerald: #0e5b47;
      --namoid-deep: #0a4a39;
      --namoid-mint: #cfe3da;
      --namoid-ink: #0a0a0a;
    }
    /* Light theme + NamoID brand fonts and emerald accents — no background override,
       so the clean light look is preserved. */
    body {
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif !important;
    }
    h1, h2, h3, .lead {
      font-family: 'Plus Jakarta Sans', sans-serif !important;
    }
    h1, h2, h3 { letter-spacing: -0.02em; }
    header h1 { color: var(--namoid-emerald); }
    a { color: var(--namoid-emerald); }
    a:hover { color: var(--namoid-deep); }
    code { font-family: 'JetBrains Mono', ui-monospace, monospace !important; }
    nav { border-bottom: 1px solid rgba(14, 91, 71, 0.12); }
    nav .logo div { color: var(--namoid-emerald); font-weight: 700; letter-spacing: -0.01em; }

assignees:                              # default owners for any site without its own `assignees`; assignees get emailed on every incident
  - harshita3199
  - ShivSankalp

# Keep a real incident audit trail — don't auto-delete short-lived downtime issues
skipDeleteIssues: true

# Built-in notifications. Email is delivered via GitHub Issue assignment above.
# Add a Slack/Telegram channel here for push alerts (see Task 5).
# notifications:
#   - type: slack
#     channel: "#alerts"

commitMessages:
  statusChange: "$PREFIX $SITE_NAME is $STATUS ($RESPONSE_CODE in $RESPONSE_TIME ms) [skip ci] [upptime]"

i18n:
  footer: "© 2026 PolyMindsLabs Pvt. Ltd. All rights reserved."
